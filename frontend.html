<!DOCTYPE html>
<html>
<head>
<title>Workflow Automation Engine</title>
<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
background:#f4f4f4;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
background:#007bff;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<h1>Workflow Automation Engine</h1>
<p>Halleyx Hackathon Project</p>

<button onclick="createWorkflow()">Create Sample Workflow</button>

<script>
async function createWorkflow(){

const response = await fetch("/workflows",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
name:"Expense Approval",
version:1,
is_active:true,
input_schema:{
amount:"number",
country:"string",
priority:"string"
},
start_step_id:null
})
})

const data = await response.json()
alert("Workflow Created: " + data.workflow.id)

}
</script>

</body>
</html>
