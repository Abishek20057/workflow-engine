<!DOCTYPE html>
<html>

<head>
<title>Workflow Automation Engine</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* engineering grid */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
pointer-events:none;
}

.header{
text-align:center;
padding:30px;
font-size:34px;
font-weight:bold;
}

.subtitle{
text-align:center;
color:#cbd5e1;
}

.container{
text-align:center;
margin-top:40px;
}

/* workflow */

.workflow{
display:flex;
justify-content:center;
align-items:center;
margin-top:50px;
}

.step{
background:#00a8cc;
color:black;
padding:18px 35px;
border-radius:10px;
margin:10px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
transition:0.4s;
}

/* active step animation */

.active{
background:#22c55e !important;
color:white;
transform:scale(1.1);
box-shadow:0 0 20px #22c55e;
}

.arrow{
font-size:28px;
margin:0 10px;
color:#94a3b8;
}

/* buttons */

.dashboard{
margin-top:60px;
}

button{
padding:14px 30px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
font-weight:bold;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
}

.footer{
margin-top:80px;
text-align:center;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">
⚙ Workflow Automation Engine
</div>

<div class="subtitle">
Engineering Automation Platform
</div>

<div class="container">

<h2>Visual Workflow Example</h2>

<div class="workflow">

<div id="step1" class="step">Start</div>

<div class="arrow">➜</div>

<div id="step2" class="step">Manager Approval</div>

<div class="arrow">➜</div>

<div id="step3" class="step">Finance Approval</div>

<div class="arrow">➜</div>

<div id="step4" class="step">Completed</div>

</div>

<div class="dashboard">

<h3>Control Panel</h3>

<button onclick="runWorkflow()">Run Demo Workflow</button>

<button onclick="createWorkflow()">Create Workflow</button>

<button onclick="viewWorkflows()">View Workflows</button>

<button onclick="openDocs()">API Docs</button>

</div>

</div>

<div class="footer">
Halleyx Hackathon Project | FastAPI Workflow Engine
</div>

<script>

function runWorkflow(){

let steps=["step1","step2","step3","step4"]

steps.forEach(id=>{
document.getElementById(id).classList.remove("active")
})

let i=0

function activate(){

if(i<steps.length){

document.getElementById(steps[i]).classList.add("active")

i++

setTimeout(activate,1000)

}

}

activate()

}

function createWorkflow(){
window.location.href="/docs#/default/create_workflow_workflows_post"
}

function viewWorkflows(){
window.location.href="/workflows"
}

function openDocs(){
window.location.href="/docs"
}

</script>

</body>
</html>
