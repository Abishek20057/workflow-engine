<!DOCTYPE html>
<html>
<head>
<title>Workflow Engine</title>
</head>

<body>

<h2>Workflow Automation Engine</h2>

<button onclick="createWorkflow()">Create Sample Workflow</button>

<script>
async function createWorkflow(){
    const response = await fetch("https://workflow-engine-ifj9.onrender.com/workflows",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            name:"Expense Approval",
            version:1,
            is_active:true,
            input_schema:{
                amount:"number",
                country:"string",
                priority:"string"
            },
            start_step_id:null
        })
    })

    const data = await response.json()
    alert(JSON.stringify(data))
}
</script>

</body>
</html>
