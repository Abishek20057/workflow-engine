<!DOCTYPE html>
<html>

<head>
<title>Workflow Automation Engine</title>

<style>

body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.header{
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:bold;
}

.container{
    text-align:center;
    margin-top:40px;
}

.workflow{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:40px;
}

.step{
    background:#00d4ff;
    color:black;
    padding:15px 25px;
    border-radius:8px;
    margin:10px;
    font-weight:bold;
}

.arrow{
    font-size:24px;
    margin:0 10px;
}

.dashboard{
    margin-top:50px;
}

button{
    padding:12px 25px;
    margin:8px;
    border:none;
    border-radius:6px;
    font-size:16px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.footer{
    margin-top:60px;
    text-align:center;
    font-size:14px;
    color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">
⚙ Workflow Automation Engine
</div>

<div class="container">

<h2>Visual Workflow Example</h2>

<div class="workflow">

<div class="step">Start</div>

<div class="arrow">➡</div>

<div class="step">Manager Approval</div>

<div class="arrow">➡</div>

<div class="step">Finance Approval</div>

<div class="arrow">➡</div>

<div class="step">Completed</div>

</div>

<div class="dashboard">

<h3>Control Panel</h3>

<button onclick="createWorkflow()">Create Workflow</button>

<button onclick="viewWorkflows()">View Workflows</button>

<button onclick="openDocs()">API Docs</button>

<button onclick="status()">System Status</button>

</div>

</div>

<div class="footer">
Halleyx Hackathon Project | FastAPI Workflow Engine
</div>

<script>

function createWorkflow(){
    window.location.href="/docs#/default/create_workflow_workflows_post"
}

function viewWorkflows(){
    window.location.href="/workflows"
}

function openDocs(){
    window.location.href="/docs"
}

function status(){
    alert("Workflow Engine Running Successfully")
}

</script>

</body>

</html>
