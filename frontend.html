<!DOCTYPE html>
<html>

<head>
<title>Workflow Automation Engine</title>

<style>

body{
font-family:"Times New Roman", serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
padding:0;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
padding:15px 40px;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* Container */

.container{
margin-top:40px;
}

/* Workflow image */

.workflow-img{
width:140px;
margin:20px;
}

/* Steps */

.steps{
margin-top:20px;
}

.step{
display:inline-block;
background:#00c6ff;
color:black;
padding:12px 25px;
border-radius:8px;
margin:10px;
}

/* Cards */

.cards{
margin-top:30px;
}

.card{
display:inline-block;
background:rgba(255,255,255,0.1);
padding:30px;
margin:15px;
border-radius:10px;
width:150px;
}

/* Buttons */

button{
padding:12px 25px;
border:none;
border-radius:6px;
background:#2ecc71;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#27ae60;
}

/* Input */

input{
width:220px;
padding:10px;
margin:8px;
border-radius:5px;
border:none;
}

/* Result */

#result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

</style>
</head>


<body>

<div class="navbar">

<div>⚙ Workflow Engine</div>

<div>
<a href="/">Home</a>
<a href="/docs">API Docs</a>
</div>

</div>


<div class="container">

<h1>Workflow Automation Engine</h1>

<p>Engineering Automation Platform</p>

<p style="color:lightgreen;">● Engine Running</p>


<img class="workflow-img"
src="https://cdn-icons-png.flaticon.com/512/2620/2620995.png">


<h2>Visual Workflow Example</h2>

<div class="steps">

<div class="step">Start</div>
→
<div class="step">Manager Approval</div>
→
<div class="step">Finance Approval</div>
→
<div class="step">Completed</div>

</div>


<div class="cards">

<div class="card">
<h2>4</h2>
<p>Workflow Steps</p>
</div>

<div class="card">
<h2>1</h2>
<p>Active Workflow</p>
</div>

<div class="card">
<h2>100%</h2>
<p>System Health</p>
</div>

</div>


<h2>Submit Expense Request</h2>

<input id="name" placeholder="Employee Name"><br>

<input id="amount" type="number" placeholder="Amount"><br>

<button onclick="submitExpense()">Submit Request</button>

<div id="result"></div>

</div>


<script>

async function submitExpense(){

let name=document.getElementById("name").value;
let amount=parseInt(document.getElementById("amount").value);

let response=await fetch("/submit-expense",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
amount:amount
})

});

let data=await response.json();

document.getElementById("result").innerHTML=data.status;

}

</script>

</body>
</html>
